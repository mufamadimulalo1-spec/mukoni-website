<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Company Profile — Mukoni</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pdf-viewer-container {
      width:100%;
      max-width:1200px;
      margin:0 auto;
    }
    
    .pdf-embed-wrapper {
      position:relative;
      padding-top:56.25%;
      height:0;
      overflow:hidden;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:0 8px 24px rgba(0,0,0,0.3);
    }
    
    .pdf-embed-wrapper iframe {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:0 !important;
    }
    
    .pdf-controls {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      margin-top:24px;
    }
    
    .pdf-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px 24px;
      border-radius:999px;
      border:none;
      font-weight:600;
      text-decoration:none;
      transition:transform 0.25s ease, background 0.25s ease;
    }
    
    .pdf-btn-primary {
      background:var(--accent);
      color:var(--bg-primary);
    }
    
    .pdf-btn-primary:hover {
      transform:translateY(-2px);
      box-shadow:0 12px 32px rgba(176,141,87,0.2);
    }
    
    .pdf-btn-secondary {
      background:rgba(255,255,255,0.06);
      color:var(--text);
      border:1px solid rgba(176,141,87,0.2);
    }
    
    .pdf-btn-secondary:hover {
      background:rgba(176,141,87,0.06);
      transform:translateY(-2px);
    }
    
    .pdf-fallback {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      padding:30px;
      border-radius:12px;
      text-align:center;
      margin-top:24px;
    }
    
    .pdf-fallback p {
      margin-bottom:18px;
      line-height:1.8;
    }
    
    @media (max-width:768px) {
      .pdf-embed-wrapper {
        border-radius:8px;
      }
      
      .pdf-controls {
        gap:10px;
      }
      
      .pdf-btn {
        padding:12px 18px;
        font-size:0.9rem;
      }
    }
    
    @media (max-width:480px) {
      .pdf-controls {
        flex-direction:column;
      }
      
      .pdf-btn {
        width:100%;
        padding:14px 16px;
      }
    }
  </style>
</head>
